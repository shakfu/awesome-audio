name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate entries
        run: python3 scripts/curator.py validate

      - name: Generate README
        run: |
          python3 scripts/curator.py import
          python3 scripts/curator.py generate -o README.md -f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scripts/curator.py
            data/entries.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
