name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate entries
        run: python3 scripts/curator.py validate

      - name: Check sorting
        run: |
          python3 scripts/curator.py sort
          git diff --exit-code data/entries.json || (echo "Entries not sorted. Run 'make sort'" && exit 1)
